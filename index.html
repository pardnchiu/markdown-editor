  <style>
    #pop {
      position: fixed;
      z-index: 1000;
      top: 0;
      left: 0; 
      bottom: 0;
      right: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(0, 0, 0, 0.5);
    }
    #pop > div {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      min-width: 240px;
      width: initial;
      height: initial;
      background-color: #eee;
      border-radius: 0.25rem;
      font-size: 0;
    }
    #pop > div > h6 {
      position: relative;
      display: inline-block;
      vertical-align: top;
      padding: 0.5rem;
      width: calc(100% - 3rem);
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      line-height: 1.5rem;
      font-size: 1rem;
      background-color: rgba(0, 0, 0, 0.05);
    }
    #pop > div > i {
      position: relative;
      display: inline-block;
      vertical-align: top;
      margin: 0;
      padding: 0;
      width: 2rem;
      line-height: 2.5rem;
      height: 2.5rem;
      font-size: 1rem;
      text-align: center;
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      cursor: pointer;
      background-color: rgba(0, 0, 0, 0.05);
    }
    #pop > div > i:hover {
      font-size: 1.25rem;
    }
    #pop > div > p {
      position: relative;
      padding: 1rem;
      line-height: 1.5rem;
      font-size: 0.875rem;
    }
    #pop > div > ul {
      position: relative;
      font-size: 0;
      border-top: 1px solid rgba(0, 0, 0, 0.1);
    }
    #pop > div > ul > li {
      position: relative;
      /* padding: 0.25rem 0; */
      line-height: 1.5rem;
      font-size: 0.875rem;
      list-style-type: none;
      cursor: pointer;
    }
    #pop > div > ul > li > i {
      position: relative;
      vertical-align: top;
      margin: 0 0.25rem;
      padding: 0;
      width: 1.5rem;
      line-height: 1.5rem;
      height: 1.5rem;
      font-size: 1rem;
      text-align: center;
    }
    #pop > div > ul > li:hover {
      background-color: rgba(0, 0, 0, 0.05);
    }
    #pop > div > ul > li {
      position: relative;
      display: block;
      width: 100%;
      text-align: center;
      border-top: 1px solid rgba(0, 0, 0, 0.1);
    }
    #pop > div > ul > li:nth-child(1) {
      border-top: none;
    }
    #pop > div > ul[row^="2"] > li {
      position: relative;
      display: inline-block;
      vertical-align: top;
      width: calc(50% - 1px);
      text-align: center;
      border-top: none;
    }
    
    #pop > div > ul[row^="2"] > li::before {
      content: "";
      position: absolute;
      top: 0.5rem;
      left: 0;
      width: 1px;
      height: 1rem;
      background-color: rgba(0, 0, 0, 0.1);
    }
    #pop > div > ul[row^="2"] > li:nth-child(1)::before {
      background-color: transparent;
    }
  </style>
